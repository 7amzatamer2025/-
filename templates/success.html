<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تم الحجز بنجاح</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .success-card { text-align: center; padding: 50px; }
        .success-card i { font-size: 4rem; color: #28a745; }
    </style>
</head>
<body>
    <div class="container success-card">
        <i class="fas fa-check-circle"></i>
        <h2>شكراً يا {{ name }}!</h2>
        <p>تم تسجيل طلب الحجز بنجاح. سيتم التواصل معك عبر الواتساب لتأكيد الموعد بعد دفع العربون.</p>
        <br>
        <a href="/" class="btn-submit" style="text-decoration: none;">العودة للرئيسية</a>
    </div>
</body>
</html>
